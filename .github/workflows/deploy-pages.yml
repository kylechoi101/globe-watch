name: Deploy web → GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Build web
        run: npm --workspace apps/web run build
        env:
          # Repo Settings → Secrets and variables → Actions → Variables
          # Set VITE_API_BASE to your deployed worker URL, e.g.
          # https://globe-watch-worker.<your-account>.workers.dev
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
          VITE_BASE: "/globe-watch/"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
