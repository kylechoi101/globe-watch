name = "globe-watch-worker"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# Single cron every 5 min. Each fire:
#   - refreshes the seed ring (one combined KV write covering all assets
#     — see seed.ts for why one combined write matters for the free-tier
#     1000-writes/day KV cap)
#   - refreshes the GDELT news cache
# Two writes/tick × 288 ticks/day = 576/day, leaving headroom under
# 1000 for any cold-isolate live cache-miss writes from news.
[triggers]
crons = ["*/5 * * * *"]

# Shared KV store for the news cache. The in-memory Map we used before
# was per-isolate, so cron-warmed data was invisible to most user
# requests.
#
# Bootstrap (one time):
#   wrangler kv namespace create NEWS_KV
#   wrangler kv namespace create NEWS_KV --preview
# then paste the returned ids below.
[[kv_namespaces]]
binding = "NEWS_KV"
id = "c625631eb40042248608472338eb639b"
preview_id = "f79342ae81e948139e5359dff079090f"

# Public env defaults. Sensitive keys go through `wrangler secret put`.
[vars]
QUOTE_PRIMARY = "yahoo"     # "yahoo" or "twelvedata"
CACHE_TTL_SECONDS = "5"

# Local dev binds; CORS allow-list for the Pages frontend.
[dev]
port = 8787
local_protocol = "http"
